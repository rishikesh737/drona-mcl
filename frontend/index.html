<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona-MCL Dashboard</title>
    <!-- React & ReactDOM (production build for speed, could be dev for debugging) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel standalone to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        hacker: {
                            bg: '#050505',
                            panel: '#0d0d0d',
                            border: '#222222',
                            primary: '#00ffcc',
                            text: '#e0e0e0',
                            dim: '#888888',
                            warning: '#ffcc00',
                            error: '#ff3333'
                        }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', 'Consolas', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .terminal-text { text-shadow: 0 0 5px rgba(0, 255, 204, 0.2); }
        .blinking-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [task, setTask] = useState("");
            const [ws, setWs] = useState(null);
            const [history, setHistory] = useState([]);
            const [thinking, setThinking] = useState("");
            const [generating, setGenerating] = useState(false);
            const bottomRef = useRef(null);

            // Auto-scroll to bottom of chat feed
            useEffect(() => {
                if (bottomRef.current) {
                    bottomRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [history, thinking]);

            const connectAndSend = (taskText) => {
                // Initialize WebSocket connection to the FastAPI backend
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const socket = new WebSocket(`${wsProtocol}//${window.location.host}/ws/chat`);
                
                socket.onopen = () => {
                    socket.send(JSON.stringify({ task: taskText }));
                    setGenerating(true);
                    setHistory(prev => [...prev, { type: 'user_task', content: taskText }]);
                    setThinking("");
                };

                socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    switch (data.type) {
                        case 'start':
                            setHistory(prev => [...prev, { type: 'system', content: 'Agent tracking task...' }]);
                            break;
                            
                        case 'iteration':
                            setHistory(prev => [...prev, { type: 'system', content: `[Iterating: Loop ${data.iteration} of ${data.max_iterations}]` }]);
                            break;
                            
                        case 'think_token':
                            // Accumulate reasoning logic in the live terminal block
                            setThinking(prev => prev + data.content);
                            break;
                            
                        case 'token':
                            // Standard output tokens (forming the final answer)
                            setHistory(prev => {
                                const last = prev[prev.length - 1];
                                if (last && last.type === 'streaming_answer') {
                                    const updated = [...prev];
                                    updated[updated.length - 1].content += data.content;
                                    return updated;
                                } else {
                                    return [...prev, { type: 'streaming_answer', content: data.content }];
                                }
                            });
                            break;
                            
                        case 'tool_call':
                            // When a tool fires, we drop the thinking block as the model has acted
                            setThinking("");
                            setHistory(prev => [...prev, { 
                                type: 'tool_call', 
                                tool_name: data.tool_name, 
                                arguments: data.arguments, 
                                output: data.output,
                                path: data.path
                            }]);
                            break;
                            
                        case 'final_answer':
                            setGenerating(false);
                            setHistory(prev => {
                                const last = prev[prev.length - 1];
                                // If we streamed an answer, convert its type. Otherwise push it.
                                if (last && last.type === 'streaming_answer') {
                                    const updated = [...prev];
                                    updated[updated.length - 1].type = 'final_answer';
                                    return updated;
                                }
                                return [...prev, { type: 'final_answer', content: data.content }];
                            });
                            socket.close();
                            break;
                            
                        case 'error':
                            setGenerating(false);
                            setHistory(prev => [...prev, { type: 'error', content: data.content }]);
                            socket.close();
                            break;
                    }
                };

                socket.onclose = () => {
                    setGenerating(false);
                };

                socket.onerror = (err) => {
                    console.error("WebSocket Error: ", err);
                    setGenerating(false);
                };

                setWs(socket);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!task.trim() || generating) return;
                
                // Reset session for fresh task
                setHistory([]);
                setThinking("");
                
                connectAndSend(task);
                setTask("");
            };

            return (
                <div className="min-h-screen bg-hacker-bg flex flex-col font-mono text-sm selection:bg-hacker-primary selection:text-black">
                    {/* Header bar */}
                    <header className="sticky top-0 z-10 border-b border-hacker-border bg-hacker-panel/90 backdrop-blur-md p-4 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-4 h-4 flex items-center justify-center rounded-full bg-hacker-border">
                                <div className={`w-2 h-2 rounded-full ${generating ? 'bg-hacker-primary animate-ping' : 'bg-green-500'}`}></div>
                            </div>
                            <h1 className="text-xl font-bold tracking-widest text-white">DRONA<span className="text-hacker-primary">_MCL</span><span className="text-hacker-dim text-sm ml-2 font-normal hidden sm:inline">// AUTONOMOUS SOC</span></h1>
                        </div>
                        <div className="flex items-center gap-3 bg-black px-3 py-1 rounded border border-hacker-border">
                            <span className="text-xs uppercase tracking-widest text-hacker-dim">SYS:</span>
                            <span className={`uppercase font-bold ${generating ? "text-hacker-warning" : "text-hacker-primary"}`}>
                                {generating ? "Engaged" : "Online"}
                            </span>
                        </div>
                    </header>

                    {/* Main Feed Container */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 scrollbar-hide flex flex-col gap-6 max-w-5xl mx-auto w-full">
                        {history.length === 0 && !generating && (
                            <div className="flex-1 flex flex-col items-center justify-center text-hacker-dim opacity-50 space-y-4">
                                <div className="text-5xl border border-hacker-dim/30 p-6 rounded-full bg-hacker-panel/50">🛡️</div>
                                <p className="text-center max-w-md tracking-wider">Awaiting mission parameters. Input task below to engage defensive node operations.</p>
                            </div>
                        )}
                        
                        {history.map((item, idx) => {
                            if (item.type === 'user_task') {
                                return (
                                    <div key={idx} className="bg-hacker-panel/30 border border-hacker-border/50 p-5 rounded self-end w-5/6 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                                        <div className="text-[10px] text-hacker-dim uppercase mb-3 flex items-center gap-2"><span className="text-blue-400">@USER</span> // COMMAND</div>
                                        <div className="text-base text-white font-sans">{item.content}</div>
                                    </div>
                                );
                            }
                            if (item.type === 'system') {
                                return (
                                    <div key={idx} className="flex items-center justify-center w-full">
                                        <span className="px-4 py-1 border border-hacker-border bg-black rounded-full text-[10px] uppercase tracking-widest text-hacker-dim">{item.content}</span>
                                    </div>
                                );
                            }
                            if (item.type === 'tool_call') {
                                return (
                                    <div key={idx} className="bg-[#0f141e] border-l-2 border-blue-500 p-5 rounded w-full shadow-[0_0_20px_rgba(0,0,0,0.3)]">
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-2 text-blue-400">
                                                <span className="font-bold tracking-widest text-xs uppercase">ACTION:</span>
                                                <span className="text-sm bg-blue-500/10 px-2 py-1 rounded border border-blue-500/20">{item.tool_name}</span>
                                            </div>
                                            <div className="text-[10px] px-2 py-0.5 bg-blue-900/30 rounded border border-blue-800 text-blue-300">PATH {item.path}</div>
                                        </div>
                                        
                                        <div className="mb-4 text-xs text-gray-300 bg-black p-3 rounded border border-hacker-border">
                                            <span className="text-hacker-dim mb-1 block uppercase text-[10px] tracking-widest">Arguments</span>
                                            {JSON.stringify(item.arguments, null, 2)}
                                        </div>
                                        
                                        <div className="text-[10px] text-hacker-dim uppercase mb-2 tracking-widest">Output</div>
                                        <div className="text-xs text-hacker-primary bg-black/80 p-3 rounded border border-hacker-border/50 overflow-x-auto whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto">
                                            {item.output}
                                        </div>
                                    </div>
                                );
                            }
                            if (item.type === 'error') {
                                return (
                                    <div key={idx} className="bg-red-950/20 border border-red-900 p-5 rounded text-red-400 w-full shadow-lg">
                                        <div className="text-xs font-bold mb-2 tracking-widest flex items-center gap-2">
                                            <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                                            CRITICAL FAILURE
                                        </div>
                                        <div className="font-sans text-sm">{item.content}</div>
                                    </div>
                                );
                            }
                            if (item.type === 'final_answer' || item.type === 'streaming_answer') {
                                return (
                                    <div key={idx} className="bg-gradient-to-br from-[#0a1a15] to-[#050d0a] border border-[#00ffcc]/30 p-6 rounded shadow-[0_0_30px_rgba(0,255,204,0.05)] w-full relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-[#00ffcc]"></div>
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="text-[10px] text-[#00ffcc] uppercase tracking-[0.2em] font-bold">Drona // Report</div>
                                            {item.type === 'streaming_answer' && <span className="flex h-2 w-2 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00ffcc] opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-[#00ffcc]"></span></span>}
                                        </div>
                                        <div className="text-gray-100 whitespace-pre-wrap font-sans text-base leading-relaxed">{item.content}</div>
                                    </div>
                                );
                            }
                            return null;
                        })}

                        {/* Live Thinking / Reasoning Terminal Block */}
                        {thinking && (
                            <div className="bg-[#050505] border border-[#333] rounded w-full relative overflow-hidden shadow-2xl">
                                <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-[#00ffcc]/50 to-transparent"></div>
                                <div className="bg-[#0d0d0d] px-4 py-2 border-b border-[#222] flex items-center gap-3">
                                    <span className="w-2 h-2 bg-hacker-warning rounded-full animate-pulse"></span>
                                    <span className="text-[10px] text-hacker-warning uppercase tracking-widest font-bold">Reasoning Engine</span>
                                </div>
                                <div className="p-4">
                                    <pre className="text-xs text-gray-400 whitespace-pre-wrap leading-relaxed terminal-text font-mono break-words">{thinking}<span className="blinking-cursor opacity-70">█</span></pre>
                                </div>
                            </div>
                        )}
                        <div ref={bottomRef} className="h-4" />
                    </main>

                    {/* Input Console */}
                    <footer className="sticky bottom-0 bg-hacker-bg p-4 md:p-6 border-t border-hacker-border shadow-[0_-10px_40px_rgba(0,0,0,0.8)] z-10">
                        <form onSubmit={handleSubmit} className="flex gap-3 max-w-5xl mx-auto w-full relative">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-hacker-primary opacity-50 select-none pointer-events-none">❯</div>
                            <input
                                type="text"
                                value={task}
                                onChange={(e) => setTask(e.target.value)}
                                disabled={generating}
                                placeholder="Command Drona... (e.g., 'Check firewalld logs and block attackers')"
                                className="flex-1 bg-hacker-panel border border-hacker-border rounded pl-10 pr-4 py-4 text-white placeholder-hacker-dim focus:outline-none focus:border-hacker-primary focus:bg-black transition-all disabled:opacity-50 font-sans shadow-inner"
                                autoFocus
                            />
                            <button
                                type="submit"
                                disabled={generating || !task.trim()}
                                className="bg-hacker-primary text-black font-bold px-6 py-4 rounded hover:bg-white transition-all disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-widest text-xs flex items-center gap-2 group"
                            >
                                <span>Execute</span>
                                <span className="group-hover:translate-x-1 transition-transform">→</span>
                            </button>
                        </form>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
