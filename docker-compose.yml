version: '3.8'

services:
  # 1. The Local AI Brain (GPU Accelerated)
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: drona-ollama
    network_mode: "host" 
    volumes:
      - /mnt/fedora-partition/ollama-models:/root/.ollama:Z
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # 2. The Autonomous SysAdmin Agent
  drona:
    build: .
    container_name: drona-agent
    privileged: true      
    network_mode: "host"  
    pid: "host"
    ports:
      - "8000:8000"
    environment:
      # Force system tools to talk to the host's DBus
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
    volumes:
      - ./ai_workspace:/app/ai_workspace:Z
      - ./config:/app/config:Z
      - ./frontend:/app/frontend:Z
      # The God-Mode systemd passthroughs:
      - /run/systemd:/run/systemd
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /var/log/journal:/var/log/journal:ro
    depends_on:
      - ollama
